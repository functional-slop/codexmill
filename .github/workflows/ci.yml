# The same gates pre-commit enforces locally (ruff, mypy, tests), run on every push/PR.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync dependencies (with dev tools)
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run --with ruff ruff check src tests

      - name: Ruff format check
        run: uv run --with ruff ruff format --check src tests

      - name: Mypy (strict)
        run: uv run mypy src tests

      - name: Pytest (offline fake backend — no network/API calls)
        run: uv run pytest
