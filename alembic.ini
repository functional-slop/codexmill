# Alembic config for the CLI (ADR 0026). The app + tests apply migrations programmatically via
# codexmill.web.db.upgrade_to_head; this file is for `alembic revision --autogenerate` / `alembic
# upgrade head` from a shell. The URL is resolved by env.py (CODEXMILL_DATABASE_URL, else SQLite).
[alembic]
script_location = src/codexmill/migrations
prepend_sys_path = src
path_separator = os

[loggers]
keys = root,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
